<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMT Pallet Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f0f2f7; }
    ::-webkit-scrollbar-thumb { background: #c5cfe0; border-radius: 10px; }
    body { font-family: 'DM Sans', sans-serif; background: #eef1f8; color: #1a2340; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    .three-canvas { display:block; width:100% !important; height:100% !important; cursor:grab; border-radius:12px; }
    .three-canvas:active { cursor:grabbing; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useMemo, useRef, useEffect, useCallback } = React;

  // ─── SHIPPING CONSTRAINTS ────────────────────────────────────────────────────
  const CONSTRAINTS = {
    MAX_HEIGHT:        65,
    WARN_HEIGHT:       60,
    MAX_OVERHANG:       3,
    MAX_GROSS_WEIGHT: 2500,
    WARN_GROSS_WEIGHT:2200,
    MIN_CPL:            2,
    MIN_COVERAGE:      0.35,
    MAX_LAYERS:        10,
  };

  const PALLET_WEIGHT = 28;
  const PL = 48;
  const PW = 40;

  const PALLET_TYPES = [
    { id:"block",    label:"Block Pallet",    height:6 },
    { id:"standard", label:"Standard Pallet", height:4 },
  ];

  const SKU_DATA = [
    { id:1, item:"Vinyl Q-Top",    size:"24x4",       L:32,    W:8,     H:8.25, weight:45.9, cpp:30 },
    { id:2, item:"Vinyl Q-Top",    size:"24x6",       L:32,    W:9.25,  H:7.25, weight:52.8, cpp:30 },
    { id:3, item:"Vinyl Q-Top",    size:"24x8",       L:32,    W:10.25, H:6,    weight:50.8, cpp:30 },
    { id:4, item:"Vinyl Q-Top",    size:"30x4",       L:38,    W:8,     H:9,    weight:62,   cpp:30 },
    { id:5, item:"Vinyl Q-Top",    size:"30x6",       L:38,    W:9,     H:6.75, weight:64,   cpp:30 },
    { id:6, item:"Vinyl Q-Top",    size:"30x8",       L:38,    W:11,    H:6,    weight:65,   cpp:30 },
    { id:7, item:"Fabric D-Skirt", size:"30in Skirt", L:33.25, W:18.25, H:9.5,  weight:52.1, cpp:12 },
    { id:8, item:"Fabric D-Skirt", size:"40in Skirt", L:43.25, W:18.25, H:9.5,  weight:68.6, cpp:12 },
    { id:9, item:"D-Pails",        size:"Pails",      L:20,    W:16.5,  H:21.5, weight:47.3, cpp:12 },
  ];

  const ACCENT = {
    "Vinyl Q-Top":    { primary:"#1782f5", light:"#e8f2ff", mid:"#b8d8ff", hex3d:0x1782f5 },
    "Fabric D-Skirt": { primary:"#7c4dbd", light:"#f0ebff", mid:"#cdb8f0", hex3d:0x7c4dbd },
    "D-Pails":        { primary:"#e07b0a", light:"#fff4e5", mid:"#fcd49a", hex3d:0xe07b0a },
  };

  // ─── PATTERN ENGINE ──────────────────────────────────────────────────────────
  function generatePatterns(sku) {
    const patterns = [];
    const seenFp = new Set();

    function addPattern(label, rects, tag, forceAdd) {
      if (!rects.length) return;
      const ohL = parseFloat(Math.max(0, Math.max(...rects.map(r => r.x + r.w)) - PL).toFixed(2));
      const ohW = parseFloat(Math.max(0, Math.max(...rects.map(r => r.y + r.h)) - PW).toFixed(2));
      if (!forceAdd) {
        if (ohL > CONSTRAINTS.MAX_OVERHANG) return;
        if (ohW > CONSTRAINTS.MAX_OVERHANG) return;
        if (rects.length < CONSTRAINTS.MIN_CPL) return;
        const coverage = (rects.length * sku.L * sku.W) / (PL * PW);
        if (coverage < CONSTRAINTS.MIN_COVERAGE) return;
      }
      const fp = rects.length + "|" + ohL.toFixed(2) + "|" + ohW.toFixed(2) + "|" + tag;
      if (seenFp.has(fp)) return;
      seenFp.add(fp);
      patterns.push({ id:tag, label, cpl:rects.length, rects, ohL, ohW, aligned:ohL===0&&ohW===0 });
    }

    if (sku.item === "Vinyl Q-Top") {
      // Layer A: 4V + 1H tucked on the RIGHT end
      const tuckedA = [];
      for (let i = 0; i < 4; i++) tuckedA.push({ x:0, y:i*sku.W, w:sku.L, h:sku.W });
      tuckedA.push({ x:sku.L, y:0, w:sku.W, h:sku.L, tucked:true });
      addPattern("4V + 1H Tucked (Pinwheel A)", tuckedA, "confirmed", true);

      // Layer B: mirror — 4V on the RIGHT side + 1H tucked on the LEFT end
      const tuckedB = [];
      const offset = sku.W; // H carton is sku.W wide, so V cartons shift right by that
      for (let i = 0; i < 4; i++) tuckedB.push({ x:offset, y:i*sku.W, w:sku.L, h:sku.W });
      tuckedB.push({ x:0, y:0, w:sku.W, h:sku.L, tucked:true });
      addPattern("4V + 1H Tucked (Pinwheel B)", tuckedB, "confirmed_b", true);

      const v4 = [];
      for (let i = 0; i < 4; i++) v4.push({ x:0, y:i*sku.W, w:sku.L, h:sku.W });
      addPattern("4 Vertical", v4, "4v", true);
      for (let rot = 0; rot < 2; rot++) {
        const cw = rot ? sku.W : sku.L, ch = rot ? sku.L : sku.W;
        for (let cols = 1; cols <= Math.ceil(PL/cw)+1; cols++)
          for (let rows = 1; rows <= Math.ceil(PW/ch)+1; rows++) {
            const rects = [];
            for (let c = 0; c < cols; c++)
              for (let r = 0; r < rows; r++)
                rects.push({ x:c*cw, y:r*ch, w:cw, h:ch });
            addPattern(cols+"x"+rows+(rot?" rot":""), rects, "g"+cols+"x"+rows+(rot?"r":""), false);
          }
      }
    } else {
      // For Skirts and Pails: pinwheel A = normal orientation, B = rotated 90°
      const cwA = sku.L, chA = sku.W;
      const colsA = Math.floor(PL / cwA), rowsA = Math.floor(PW / chA);
      if (colsA >= 1 && rowsA >= 1) {
        const rectsA = [];
        for (let c = 0; c < colsA; c++)
          for (let r = 0; r < rowsA; r++)
            rectsA.push({ x:c*cwA, y:r*chA, w:cwA, h:chA });
        addPattern("Pinwheel A", rectsA, "confirmed", true);
      }
      const cwB = sku.W, chB = sku.L;
      const colsB = Math.floor(PL / cwB), rowsB = Math.floor(PW / chB);
      if (colsB >= 1 && rowsB >= 1) {
        const rectsB = [];
        for (let c = 0; c < colsB; c++)
          for (let r = 0; r < rowsB; r++)
            rectsB.push({ x:c*cwB, y:r*chB, w:cwB, h:chB });
        addPattern("Pinwheel B", rectsB, "confirmed_b", true);
      }
      for (let rot = 0; rot < 2; rot++) {
        const cw = rot ? sku.W : sku.L, ch = rot ? sku.L : sku.W;
        for (let cols = 1; cols <= Math.ceil(PL/cw)+1; cols++)
          for (let rows = 1; rows <= Math.ceil(PW/ch)+1; rows++) {
            const rects = [];
            for (let c = 0; c < cols; c++)
              for (let r = 0; r < rows; r++)
                rects.push({ x:c*cw, y:r*ch, w:cw, h:ch });
            addPattern(cols+"x"+rows+(rot?" rot":""), rects, "g"+cols+"x"+rows+(rot?"r":""), false);
          }
      }
    }

    patterns.sort((a,b) => {
      if (a.id==="confirmed") return -1;
      if (b.id==="confirmed") return 1;
      if (a.id==="confirmed_b") return -1;
      if (b.id==="confirmed_b") return 1;
      if (b.cpl !== a.cpl) return b.cpl - a.cpl;
      return (a.ohL + a.ohW) - (b.ohL + b.ohW);
    });
    return patterns;
  }

  // ─── MIXED LAYER BUILDER ─────────────────────────────────────────────────────
  function getFreeRects(usedRects) {
    if (!usedRects.length) return [{ x:0, y:0, w:PL, h:PW }];

    // Start with full pallet, subtract each used rect via guillotine splits
    let freeRects = [{ x:0, y:0, w:PL, h:PW }];

    usedRects.forEach(used => {
      const next = [];
      freeRects.forEach(free => {
        // No overlap — keep free rect unchanged
        if (used.x >= free.x + free.w || used.x + used.w <= free.x ||
            used.y >= free.y + free.h || used.y + used.h <= free.y) {
          next.push(free);
          return;
        }
        // Guillotine: carve up to 4 strips around the used rect
        if (used.x > free.x)
          next.push({ x:free.x,          y:free.y, w:used.x - free.x,                       h:free.h });
        if (used.x + used.w < free.x + free.w)
          next.push({ x:used.x + used.w, y:free.y, w:(free.x + free.w) - (used.x + used.w), h:free.h });
        if (used.y > free.y)
          next.push({ x:free.x, y:free.y,          w:free.w, h:used.y - free.y });
        if (used.y + used.h < free.y + free.h)
          next.push({ x:free.x, y:used.y + used.h, w:free.w, h:(free.y + free.h) - (used.y + used.h) });
      });
      freeRects = next;
    });

    // Clamp to pallet bounds and discard slivers
    return freeRects
      .map(r => {
        const x1 = Math.max(0, r.x), y1 = Math.max(0, r.y);
        const x2 = Math.min(r.x + r.w, PL), y2 = Math.min(r.y + r.h, PW);
        return { x:x1, y:y1, w:x2-x1, h:y2-y1 };
      })
      .filter(r => r.w > 0.5 && r.h > 0.5);
  }

  function fitInGap(sku, gap) {
    let best = null;
    for (let rot = 0; rot < 2; rot++) {
      const cw = rot ? sku.W : sku.L, ch = rot ? sku.L : sku.W;
      const cols = Math.floor((gap.w + 0.01) / cw);
      const rows = Math.floor((gap.h + 0.01) / ch);
      if (cols < 1 || rows < 1) continue;
      const rects = [];
      for (let c = 0; c < cols; c++)
        for (let r = 0; r < rows; r++)
          rects.push({ x:gap.x + c*cw, y:gap.y + r*ch, w:cw, h:ch });
      if (!rects.length) continue;
      const ohL = Math.max(0, Math.max(...rects.map(r => r.x + r.w)) - PL);
      const ohW = Math.max(0, Math.max(...rects.map(r => r.y + r.h)) - PW);
      if (ohL > CONSTRAINTS.MAX_OVERHANG || ohW > CONSTRAINTS.MAX_OVERHANG) continue;
      const score = rects.length * 1000 - (ohL + ohW);
      if (!best || score > best.score) best = { rects, ohL, ohW, score };
    }
    return best;
  }

  function buildLayers(qtys, selectedPatterns) {
    const remaining = {};
    const skuList = [];
    SKU_DATA.forEach(sku => {
      const qty = qtys[sku.id] || 0;
      if (!qty) return;
      remaining[sku.id] = qty;
      const all = generatePatterns(sku);
      // Store both A and B patterns alongside user selection
      const selectedId = selectedPatterns[sku.id];
      const patternA = all.find(p => p.id === (selectedId || "confirmed")) || all.find(p => p.id === "confirmed") || all[0];
      const patternB = all.find(p => p.id === "confirmed_b") || patternA; // fallback to A if no B
      skuList.push({ sku, patternA, patternB, cpl: patternA ? patternA.cpl : 1, selectedId });
    });

    const layers = [];
    while (skuList.some(s => remaining[s.sku.id] > 0)) {
      const layerIdx = layers.length;
      const isEvenLayer = layerIdx % 2 === 0;
      const active = skuList.filter(s => remaining[s.sku.id] > 0);
      active.sort((a,b) => b.sku.H - a.sku.H);
      const layerSlots = [];
      let usedRects = [];
      let skusOnLayer = 0;
      for (let si = 0; si < active.length && skusOnLayer < 3; si++) {
        const { sku, patternA, patternB, cpl, selectedId } = active[si];
        if (remaining[sku.id] <= 0) continue;
        // If user selected pinwheel (confirmed/confirmed_b) or no selection, alternate A/B
        // If user picked a specific non-pinwheel pattern, respect it every layer
        const isPinwheel = !selectedId || selectedId === "confirmed" || selectedId === "confirmed_b";
        const pattern = isPinwheel ? (isEvenLayer ? patternA : patternB) : patternA;
        if (skusOnLayer === 0) {
          const cartonsThisSlot = Math.min(remaining[sku.id], pattern ? pattern.cpl : cpl);
          const rects = pattern ? pattern.rects.slice(0, cartonsThisSlot) : [];
          layerSlots.push({ sku, pattern, rects, cartonsThisSlot });
          usedRects = usedRects.concat(rects);
          remaining[sku.id] -= cartonsThisSlot;
          skusOnLayer++;
        } else {
          const freeRects = getFreeRects(usedRects);
          let bestFit = null;
          freeRects.forEach(gap => {
            const fit = fitInGap(sku, gap);
            if (fit && (!bestFit || fit.score > bestFit.score)) bestFit = fit;
          });
          if (bestFit && bestFit.rects.length > 0) {
            const cartonsThisSlot = Math.min(remaining[sku.id], bestFit.rects.length);
            const rects = bestFit.rects.slice(0, cartonsThisSlot);
            // Gap-fill rects come from bestFit, not the primary pattern, so store null
            // to avoid false overhang warnings from unrelated pattern metadata.
            layerSlots.push({ sku, pattern: null, rects, cartonsThisSlot });
            usedRects = usedRects.concat(rects);
            remaining[sku.id] -= cartonsThisSlot;
            skusOnLayer++;
          }
        }
      }
      if (!layerSlots.length) break;
      const layerH = Math.max(...layerSlots.map(s => s.sku.H));
      layers.push({ slots: layerSlots, layerH });
    }
    return layers;
  }

  function getRectsForLayer(layer) {
    const out = [];
    layer.slots.forEach(slot => {
      slot.rects.forEach(r => out.push({ rect:r, sku:slot.sku }));
    });
    return out;
  }

  // ─── CALCULATE ───────────────────────────────────────────────────────────────
  function calculate(qtys, palletType, selectedPatterns) {
    let totalFraction=0, cargoWeight=0, totalCartons=0;
    let effectiveL=PL, effectiveW=PW;
    const overhangItems = [];

    SKU_DATA.forEach(sku => {
      const qty = qtys[sku.id] || 0;
      if (!qty) return;
      totalFraction += qty / sku.cpp;
      cargoWeight   += qty * sku.weight;
      totalCartons  += qty;
    });

    const builtLayers = buildLayers(qtys, selectedPatterns);
    let maxStackH = 0;
    builtLayers.forEach(layer => {
      maxStackH += layer.layerH;
      layer.slots.forEach(slot => {
        slot.rects.forEach(r => {
          const ohL = Math.max(0, r.x + r.w - PL);
          const ohW = Math.max(0, r.y + r.h - PW);
          effectiveL = Math.max(effectiveL, PL + ohL);
          effectiveW = Math.max(effectiveW, PW + ohW);
        });
        if (slot.pattern && (slot.pattern.ohL > 0 || slot.pattern.ohW > 0)) {
          const already = overhangItems.find(o => o.sku.id === slot.sku.id);
          if (!already) overhangItems.push({ sku:slot.sku, pattern:slot.pattern });
        }
      });
    });

    const pallets     = Math.ceil(totalFraction);
    const totalH      = parseFloat((palletType.height + maxStackH).toFixed(2));
    const grossWeight = Math.round(cargoWeight + pallets * PALLET_WEIGHT);
    const fillPct     = pallets > 0 ? Math.min(1, totalFraction / pallets) : 0;

    return {
      pallets, totalH, stackH:maxStackH, fillPct, totalCartons,
      cargoWeight: Math.round(cargoWeight), grossWeight,
      effectiveL: parseFloat(effectiveL.toFixed(2)),
      effectiveW: parseFloat(effectiveW.toFixed(2)),
      palletDeckH: palletType.height,
      overhangItems, hasOverhang: overhangItems.length > 0,
    };
  }

  function getWarnings(res, layers) {
    const w = [];
    if (res.totalH > CONSTRAINTS.MAX_HEIGHT)
      w.push({ level:"error", msg:"Height " + res.totalH + '" exceeds the ' + CONSTRAINTS.MAX_HEIGHT + '" carrier limit.' });
    else if (res.totalH > CONSTRAINTS.WARN_HEIGHT)
      w.push({ level:"warn", msg:"Height " + res.totalH + '" is approaching the ' + CONSTRAINTS.MAX_HEIGHT + '" limit.' });
    if (res.grossWeight > CONSTRAINTS.MAX_GROSS_WEIGHT)
      w.push({ level:"error", msg:"Gross weight " + res.grossWeight.toLocaleString() + " lb exceeds the " + CONSTRAINTS.MAX_GROSS_WEIGHT.toLocaleString() + " lb LTL limit." });
    else if (res.grossWeight > CONSTRAINTS.WARN_GROSS_WEIGHT)
      w.push({ level:"warn", msg:"Gross weight " + res.grossWeight.toLocaleString() + " lb is approaching the " + CONSTRAINTS.MAX_GROSS_WEIGHT.toLocaleString() + " lb LTL limit." });
    res.overhangItems.forEach(function(oi) {
      const parts = [];
      if (oi.pattern.ohL > 0) parts.push(oi.pattern.ohL + '" on length');
      if (oi.pattern.ohW > 0) parts.push(oi.pattern.ohW.toFixed(1) + '" on width');
      w.push({ level:"info", msg:oi.sku.item + " " + oi.sku.size + " (" + oi.pattern.label + "): overhangs " + parts.join(" / ") });
    });
    if (layers.length > CONSTRAINTS.MAX_LAYERS)
      w.push({ level:"warn", msg:"Stack exceeds " + CONSTRAINTS.MAX_LAYERS + " layers. Consider splitting." });
    return w;
  }

  // ─── THREE.JS 3D RENDERER ────────────────────────────────────────────────────
  // Scale: 1 Three.js unit = 10 inches
  const SCALE = 0.05; // inches → three units (so 48" = 2.4 units)

  function makeCartonLabel(text, color) {
    const canvas = document.createElement("canvas");
    canvas.width = 256; canvas.height = 128;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "rgba(0,0,0,0)";
    ctx.fillRect(0,0,256,128);
    ctx.fillStyle = color;
    ctx.font = "bold 32px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, 128, 64);
    return new THREE.CanvasTexture(canvas);
  }

  // Wood plank texture for pallet
  function makeWoodTexture() {
    const canvas = document.createElement("canvas");
    canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#c9a55a";
    ctx.fillRect(0,0,256,64);
    // Grain lines
    for (let i = 0; i < 20; i++) {
      const y = Math.random() * 64;
      const alpha = 0.05 + Math.random() * 0.1;
      ctx.strokeStyle = `rgba(80,40,0,${alpha})`;
      ctx.lineWidth = 0.5 + Math.random() * 1.5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(256, y + (Math.random()-0.5)*4);
      ctx.stroke();
    }
    // Knots
    for (let i = 0; i < 3; i++) {
      const x = 30 + Math.random() * 196;
      const y = 15 + Math.random() * 34;
      const r = 3 + Math.random() * 5;
      ctx.strokeStyle = "rgba(80,40,0,0.2)";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
    }
    return new THREE.CanvasTexture(canvas);
  }

  function ThreeRenderer({ layers, res, palletType, activeLayer, onLayerClick }) {
    const mountRef = useRef(null);
    const sceneRef = useRef(null);
    const rendererRef = useRef(null);
    const cameraRef = useRef(null);
    const animRef = useRef(null);
    const orbitRef = useRef({
      isDragging: false, lastX: 0, lastY: 0,
      theta: -0.5, phi: 0.55, radius: 6,
      targetTheta: -0.5, targetPhi: 0.55,
    });
    const [autoRotate, setAutoRotate] = useState(false);
    const [isLoaded, setIsLoaded] = useState(false);
    const autoRotateRef = useRef(false);
    const cartonMeshesRef = useRef([]);

    // Sync autoRotate ref
    useEffect(() => { autoRotateRef.current = autoRotate; }, [autoRotate]);

    // Init Three.js scene once
    useEffect(() => {
      const mount = mountRef.current;
      if (!mount) return;

      const W = mount.clientWidth, H = mount.clientHeight;

      // Scene
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a2340);
      scene.fog = new THREE.FogExp2(0x1a2340, 0.07);
      sceneRef.current = scene;

      // Camera
      const camera = new THREE.PerspectiveCamera(45, W/H, 0.01, 100);
      camera.position.set(4, 4, 5);
      camera.lookAt(1.2, 1, 1.0);
      cameraRef.current = camera;

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false, preserveDrawingBuffer:true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      renderer.domElement.className = "three-canvas";
      mount.appendChild(renderer.domElement);
      rendererRef.current = renderer;

      // Lights
      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
      dirLight.position.set(5, 10, 5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.near = 0.1;
      dirLight.shadow.camera.far = 30;
      dirLight.shadow.camera.left = -5;
      dirLight.shadow.camera.right = 5;
      dirLight.shadow.camera.top = 5;
      dirLight.shadow.camera.bottom = -5;
      dirLight.shadow.bias = -0.001;
      scene.add(dirLight);

      const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
      fillLight.position.set(-3, 2, -3);
      scene.add(fillLight);

      const rimLight = new THREE.DirectionalLight(0xffffff, 0.2);
      rimLight.position.set(0, -2, 5);
      scene.add(rimLight);

      // Ground reflection plane
      const groundGeo = new THREE.PlaneGeometry(20, 20);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x111825,
        roughness: 0.8,
        metalness: 0.1,
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.02;
      ground.receiveShadow = true;
      scene.add(ground);

      // Grid lines on ground
      const gridHelper = new THREE.GridHelper(12, 24, 0x243050, 0x1e2d46);
      gridHelper.position.y = -0.015;
      scene.add(gridHelper);

      setIsLoaded(true);

      // Resize handler
      const onResize = () => {
        const W2 = mount.clientWidth, H2 = mount.clientHeight;
        camera.aspect = W2 / H2;
        camera.updateProjectionMatrix();
        renderer.setSize(W2, H2);
      };
      window.addEventListener("resize", onResize);

      // Orbit controls - mouse
      const onMouseDown = (e) => {
        orbitRef.current.isDragging = true;
        orbitRef.current.lastX = e.clientX;
        orbitRef.current.lastY = e.clientY;
      };
      const onMouseMove = (e) => {
        if (!orbitRef.current.isDragging) return;
        const dx = e.clientX - orbitRef.current.lastX;
        const dy = e.clientY - orbitRef.current.lastY;
        orbitRef.current.targetTheta += dx * 0.008;
        orbitRef.current.targetPhi = Math.max(0.1, Math.min(1.4, orbitRef.current.targetPhi - dy * 0.006));
        orbitRef.current.lastX = e.clientX;
        orbitRef.current.lastY = e.clientY;
      };
      const onMouseUp = () => { orbitRef.current.isDragging = false; };
      const onWheel = (e) => {
        orbitRef.current.radius = Math.max(2, Math.min(12, orbitRef.current.radius + e.deltaY * 0.005));
        e.preventDefault();
      };

      // Touch controls
      const onTouchStart = (e) => {
        if (e.touches.length === 1) {
          orbitRef.current.isDragging = true;
          orbitRef.current.lastX = e.touches[0].clientX;
          orbitRef.current.lastY = e.touches[0].clientY;
        }
      };
      const onTouchMove = (e) => {
        if (!orbitRef.current.isDragging || e.touches.length !== 1) return;
        const dx = e.touches[0].clientX - orbitRef.current.lastX;
        const dy = e.touches[0].clientY - orbitRef.current.lastY;
        orbitRef.current.targetTheta += dx * 0.008;
        orbitRef.current.targetPhi = Math.max(0.1, Math.min(1.4, orbitRef.current.targetPhi - dy * 0.006));
        orbitRef.current.lastX = e.touches[0].clientX;
        orbitRef.current.lastY = e.touches[0].clientY;
      };
      const onTouchEnd = () => { orbitRef.current.isDragging = false; };

      renderer.domElement.addEventListener("mousedown", onMouseDown);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
      renderer.domElement.addEventListener("wheel", onWheel, { passive:false });
      renderer.domElement.addEventListener("touchstart", onTouchStart, { passive:true });
      renderer.domElement.addEventListener("touchmove", onTouchMove, { passive:true });
      renderer.domElement.addEventListener("touchend", onTouchEnd);

      // Animate loop
      const animate = () => {
        animRef.current = requestAnimationFrame(animate);
        const o = orbitRef.current;

        // Smooth orbit
        o.theta += (o.targetTheta - o.theta) * 0.08;
        o.phi   += (o.targetPhi   - o.phi)   * 0.08;

        if (autoRotateRef.current && !o.isDragging) {
          o.targetTheta += 0.003;
        }

        const r = o.radius;
        camera.position.x = r * Math.sin(o.theta) * Math.cos(o.phi) + 1.2;
        camera.position.y = r * Math.sin(o.phi) + 1.0;
        camera.position.z = r * Math.cos(o.theta) * Math.cos(o.phi) + 1.0;
        camera.lookAt(1.2, 1.2, 1.0);

        renderer.render(scene, camera);
      };
      animate();

      return () => {
        cancelAnimationFrame(animRef.current);
        window.removeEventListener("resize", onResize);
        window.removeEventListener("mousemove", onMouseMove);
        window.removeEventListener("mouseup", onMouseUp);
        renderer.domElement.removeEventListener("mousedown", onMouseDown);
        renderer.domElement.removeEventListener("wheel", onWheel);
        renderer.domElement.removeEventListener("touchstart", onTouchStart);
        renderer.domElement.removeEventListener("touchmove", onTouchMove);
        renderer.domElement.removeEventListener("touchend", onTouchEnd);
        renderer.dispose();
        if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      };
    }, []);

    // Rebuild 3D geometry when layers change
    useEffect(() => {
      const scene = sceneRef.current;
      if (!scene || !isLoaded) return;

      // Remove old cartons/pallet
      const toRemove = [];
      scene.traverse(obj => {
        if (obj.userData && obj.userData.isPalletContent) toRemove.push(obj);
      });
      toRemove.forEach(obj => {
        scene.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      });
      cartonMeshesRef.current = [];

      if (!layers.length || !res) return;

      const INCH = SCALE; // 1 inch in Three units
      const GAP = 0.03;   // small visual gap between cartons

      // === PALLET ===
      const palletH = palletType.height * INCH;
      const palletL = PL * INCH;
      const palletW = PW * INCH;

      const woodTex = makeWoodTexture();
      woodTex.wrapS = THREE.RepeatWrapping;
      woodTex.wrapT = THREE.RepeatWrapping;
      woodTex.repeat.set(4, 1);

      // Pallet deck (top board)
      const deckGeo = new THREE.BoxGeometry(palletL, palletH * 0.35, palletW);
      const deckMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness:0.85, metalness:0 });
      const deck = new THREE.Mesh(deckGeo, deckMat);
      deck.position.set(palletL/2, palletH * 0.82, palletW/2);
      deck.castShadow = true;
      deck.receiveShadow = true;
      deck.userData = { isPalletContent: true };
      scene.add(deck);

      // Pallet boards (3 slats across)
      for (let i = 0; i < 3; i++) {
        const slat = new THREE.Mesh(
          new THREE.BoxGeometry(palletL, palletH * 0.55, palletW * 0.12),
          new THREE.MeshStandardMaterial({ map: woodTex, roughness:0.9, metalness:0 })
        );
        slat.position.set(palletL/2, palletH * 0.3, palletW * (0.1 + i * 0.4));
        slat.castShadow = true;
        slat.receiveShadow = true;
        slat.userData = { isPalletContent: true };
        scene.add(slat);
      }

      // Pallet feet
      for (let xi = 0; xi < 3; xi++) {
        for (let zi = 0; zi < 2; zi++) {
          const foot = new THREE.Mesh(
            new THREE.BoxGeometry(palletL * 0.22, palletH * 0.45, palletW * 0.14),
            new THREE.MeshStandardMaterial({ color:0xb8903a, roughness:0.9 })
          );
          foot.position.set(
            palletL * (0.1 + xi * 0.4),
            palletH * 0.22,
            palletW * (0.1 + zi * 0.8)
          );
          foot.castShadow = true;
          foot.receiveShadow = true;
          foot.userData = { isPalletContent: true };
          scene.add(foot);
        }
      }

      // === CARTONS ===
      let curY = palletH; // start at top of pallet deck

      layers.forEach((layer, layerIdx) => {
        const isActiveLayer = layerIdx === Math.min(activeLayer, layers.length-1);
        const layerH = layer.layerH * INCH;

        layer.slots.forEach(slot => {
          const { sku } = slot;
          const ac = ACCENT[sku.item];
          const baseColor = ac.hex3d;
          const isOH = slot.pattern && (slot.pattern.ohL > 0 || slot.pattern.ohW > 0);

          slot.rects.forEach(r => {
            const GAP_ACTIVE = GAP;
            const inset = isActiveLayer ? 0 : 0.008; // slight inset on inactive so layers read as separate
            const cL = r.w * INCH - GAP_ACTIVE - inset;
            const cW = r.h * INCH - GAP_ACTIVE - inset;
            const cH = sku.H * INCH - GAP_ACTIVE;

            const geo = new THREE.BoxGeometry(cL, cH, cW);

            // Active layer = full brightness; others = darkened but fully opaque (no ghosting through)
            const col = new THREE.Color(isOH ? 0xf59e0b : baseColor);
            if (!isActiveLayer) {
              // Blend toward the background dark blue to make inactive layers recede
              col.multiplyScalar(0.18).lerp(new THREE.Color(0x1a2340), 0.6);
            }

            const mat = new THREE.MeshStandardMaterial({
              color: col,
              roughness: isActiveLayer ? 0.55 : 0.95,
              metalness: 0,
              emissive: isActiveLayer ? new THREE.Color(isOH ? 0xf59e0b : baseColor).multiplyScalar(0.08) : new THREE.Color(0x000000),
              transparent: false,
              depthWrite: true,
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(
              r.x * INCH + cL/2 + GAP/2,
              curY + cH/2 + GAP/2,
              r.y * INCH + cW/2 + GAP/2
            );
            mesh.castShadow = isActiveLayer;
            mesh.receiveShadow = true;
            mesh.userData = { isPalletContent:true, layerIdx, sku };
            scene.add(mesh);
            cartonMeshesRef.current.push(mesh);

            // Add edge lines for active layer cartons (crisp wireframe accent)
            if (isActiveLayer) {
              const edgesGeo = new THREE.EdgesGeometry(geo);
              const edgeColor = new THREE.Color(isOH ? 0xfbbf24 : baseColor).multiplyScalar(1.8);
              const edgeMat = new THREE.LineBasicMaterial({ color: edgeColor, transparent:true, opacity:0.6 });
              const edges = new THREE.LineSegments(edgesGeo, edgeMat);
              edges.position.copy(mesh.position);
              edges.userData = { isPalletContent:true };
              scene.add(edges);
            }
          });
        });

        curY += layerH;
      });

      // === WRAP STRAPPING LINES (decorative) ===
      if (layers.length > 1 && res) {
        const strapH = palletH + (res.stackH * INCH * 0.5);
        const strapMat = new THREE.LineBasicMaterial({ color: 0x334466, linewidth: 1, transparent:true, opacity:0.5 });
        const strapPts = [
          new THREE.Vector3(0, strapH, palletW/2),
          new THREE.Vector3(palletL, strapH, palletW/2),
          new THREE.Vector3(palletL, 0, palletW/2),
          new THREE.Vector3(0, 0, palletW/2),
          new THREE.Vector3(0, strapH, palletW/2),
        ];
        const strapGeo = new THREE.BufferGeometry().setFromPoints(strapPts);
        const strap = new THREE.Line(strapGeo, strapMat);
        strap.userData = { isPalletContent:true };
        scene.add(strap);
      }

      // === HEIGHT INDICATOR ===
      if (res) {
        const totalH3 = res.totalH * INCH;
        const indicatorMat = new THREE.LineBasicMaterial({ color: res.totalH > 65 ? 0xef4444 : res.totalH > 60 ? 0xf59e0b : 0x1782f5, transparent:true, opacity:0.7 });
        const indicatorPts = [
          new THREE.Vector3(palletL + 0.15, 0, palletW/2),
          new THREE.Vector3(palletL + 0.15, totalH3, palletW/2),
        ];
        const indicatorGeo = new THREE.BufferGeometry().setFromPoints(indicatorPts);
        const indicator = new THREE.Line(indicatorGeo, indicatorMat);
        indicator.userData = { isPalletContent:true };
        scene.add(indicator);

        // Tick marks at pallet top and stack top
        [[0, "base"], [totalH3, "top"]].forEach(([y]) => {
          const tickPts = [
            new THREE.Vector3(palletL + 0.1, y, palletW/2),
            new THREE.Vector3(palletL + 0.2, y, palletW/2),
          ];
          const tickGeo = new THREE.BufferGeometry().setFromPoints(tickPts);
          const tick = new THREE.Line(tickGeo, indicatorMat);
          tick.userData = { isPalletContent:true };
          scene.add(tick);
        });
      }

    }, [layers, activeLayer, palletType, isLoaded, res]);

    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", position:"relative", minHeight:0 }}>
        {/* 3D Canvas mount */}
        <div ref={mountRef} style={{ flex:1, minHeight:0, borderRadius:12, overflow:"hidden", position:"relative" }}>
          {!isLoaded && (
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background:"#1a2340", borderRadius:12 }}>
              <div style={{ textAlign:"center", color:"#4a6080" }}>
                <div style={{ fontSize:28, animation:"spin 1s linear infinite", display:"inline-block" }}>⟳</div>
                <div style={{ fontSize:12, marginTop:8 }}>Initializing WebGL…</div>
              </div>
            </div>
          )}
        </div>

        {/* HUD Controls */}
        <div style={{ position:"absolute", top:10, right:10, display:"flex", flexDirection:"column", gap:6, zIndex:10 }}>
          <button
            onClick={() => setAutoRotate(r => !r)}
            title={autoRotate ? "Stop rotation" : "Auto-rotate"}
            style={{
              width:32, height:32, borderRadius:8, border:"1.5px solid " + (autoRotate ? "#1782f5" : "#2a3a5a"),
              background: autoRotate ? "#1782f530" : "#12192a",
              color: autoRotate ? "#1782f5" : "#4a6080",
              cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center",
              transition:"all 0.15s",
            }}
          >↻</button>
          <button
            title="Reset view"
            onClick={() => {
              orbitRef.current.targetTheta = -0.5;
              orbitRef.current.targetPhi = 0.55;
              orbitRef.current.radius = 6;
            }}
            style={{
              width:32, height:32, borderRadius:8, border:"1.5px solid #2a3a5a",
              background:"#12192a", color:"#4a6080",
              cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center",
            }}
          >⌂</button>
          <button
            title="Top-down view"
            onClick={() => {
              orbitRef.current.targetTheta = 0;
              orbitRef.current.targetPhi = 1.38;
              orbitRef.current.radius = 7;
            }}
            style={{
              width:32, height:32, borderRadius:8, border:"1.5px solid #2a3a5a",
              background:"#12192a", color:"#4a6080",
              cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center",
              fontWeight:700, fontFamily:"inherit",
            }}
          >T</button>
          <button
            title="Front view"
            onClick={() => {
              orbitRef.current.targetTheta = Math.PI/2;
              orbitRef.current.targetPhi = 0.25;
              orbitRef.current.radius = 7;
            }}
            style={{
              width:32, height:32, borderRadius:8, border:"1.5px solid #2a3a5a",
              background:"#12192a", color:"#4a6080",
              cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center",
              fontWeight:700, fontFamily:"inherit",
            }}
          >F</button>
        </div>

        {/* Drag hint */}
        {isLoaded && layers.length > 0 && (
          <div style={{ position:"absolute", bottom:10, left:"50%", transform:"translateX(-50%)", fontSize:10, color:"#3a5070", background:"#0e1520cc", padding:"4px 10px", borderRadius:20, pointerEvents:"none", letterSpacing:"0.05em", whiteSpace:"nowrap" }}>
            drag to orbit · scroll to zoom
          </div>
        )}

        {/* Legend */}
        {isLoaded && layers.length > 0 && (
          <div style={{ position:"absolute", bottom:10, left:10, display:"flex", flexDirection:"column", gap:4, background:"#0e1520cc", padding:"8px 10px", borderRadius:8, backdropFilter:"blur(4px)" }}>
            {Object.entries(ACCENT).map(([item, ac]) => {
              const hasSku = layers.some(l => l.slots.some(s => s.sku.item === item));
              if (!hasSku) return null;
              return (
                <div key={item} style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <div style={{ width:10, height:10, borderRadius:2, background:ac.primary, flexShrink:0 }} />
                  <span style={{ fontSize:9, color:"#7090b0", fontWeight:500 }}>{item}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* Empty state */}
        {isLoaded && !layers.length && (
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
            <div style={{ fontSize:48, opacity:0.08 }}>▣</div>
            <div style={{ fontSize:12, color:"#3a5070", marginTop:12, textAlign:"center", lineHeight:1.8 }}>Enter quantities<br/>to see your 3D pallet</div>
          </div>
        )}
      </div>
    );
  }

  // ─── MINI DIAGRAM ────────────────────────────────────────────────────────────
  function MiniDiagram({ pattern, sku, size }) {
    const ac = ACCENT[sku.item];
    const maxX = Math.max(PL, ...pattern.rects.map(r => r.x + r.w));
    const maxY = Math.max(PW, ...pattern.rects.map(r => r.y + r.h));
    const s = (size - 6) / Math.max(maxX, maxY);
    const pw = PL*s, ph = PW*s;
    return (
      <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
        <div style={{ position:"absolute", left:3, top:3, width:pw, height:ph, background:"#f0f3fa", border:"1.5px solid #d0d8ec", borderRadius:2 }} />
        {pattern.rects.map((r, i) => {
          const oh = (r.x + r.w > PL) || (r.y + r.h > PW);
          return (
            <div key={i} style={{
              position:"absolute",
              left:3 + r.x*s, top:3 + r.y*s,
              width:r.w*s, height:r.h*s,
              background: oh ? "#fff3cd" : ac.light,
              border:"1.5px " + (r.tucked ? "dashed" : "solid") + " " + (oh ? "#f5a623" : ac.primary),
              borderRadius:1,
            }} />
          );
        })}
        {pattern.id === "confirmed" && (
          <div style={{ position:"absolute", top:2, right:2, width:7, height:7, borderRadius:"50%", background:"#1a9e6a" }} />
        )}
      </div>
    );
  }

  // ─── PATTERN SELECTOR ────────────────────────────────────────────────────────
  function PatternSelector({ sku, selectedPatternId, onSelect, showOverhang }) {
    const ac = ACCENT[sku.item];
    const all = useMemo(() => generatePatterns(sku), [sku.id]);

    // Collapse confirmed + confirmed_b into one "Pinwheel" entry for the UI
    // The alternation happens automatically in buildLayers
    const dedupedAll = [];
    let addedPinwheel = false;
    all.forEach(p => {
      if (p.id === "confirmed" || p.id === "confirmed_b") {
        if (!addedPinwheel) {
          const labelBase = sku.item === "Vinyl Q-Top" ? "4V + 1H Tucked Pinwheel" : "Pinwheel (alternating)";
          dedupedAll.push({ ...p, id:"confirmed", label:labelBase, isPinwheel:true });
          addedPinwheel = true;
        }
      } else {
        dedupedAll.push(p);
      }
    });

    const visible = showOverhang ? dedupedAll : dedupedAll.filter(p => p.aligned || p.isPinwheel);
    const isPinwheelSel = !selectedPatternId || selectedPatternId === "confirmed" || selectedPatternId === "confirmed_b";

    if (!visible.length) return (
      <div style={{ padding:"10px 14px", background:"#f8f9fd", borderTop:"1px solid " + ac.mid, fontSize:11, color:"#8fa0bc", fontStyle:"italic", animation:"slideDown 0.2s ease" }}>
        No aligned patterns available. Switch to Overhang mode to see options.
      </div>
    );

    return (
      <div style={{ padding:"10px 14px 14px", background:"#f8f9fd", borderTop:"1px solid " + ac.mid, animation:"slideDown 0.2s ease" }}>
        <div style={{ fontSize:10, fontWeight:600, color:"#8fa0bc", letterSpacing:"0.1em", marginBottom:10 }}>LAYER PATTERN</div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {visible.map(p => {
            const isSel = p.isPinwheel ? isPinwheelSel : p.id === selectedPatternId;
            return (
              <button key={p.id} onClick={() => onSelect(sku.id, p.id)} style={{
                display:"flex", flexDirection:"column", alignItems:"center", gap:5,
                padding:"8px 9px", borderRadius:10, cursor:"pointer", fontFamily:"inherit",
                background: isSel ? ac.light : "#fff",
                border:"2px solid " + (isSel ? ac.primary : "#e0e5f0"),
                boxShadow: isSel ? "0 2px 10px " + ac.primary + "30" : "none",
                transition:"all 0.15s", minWidth:74,
              }}>
                <MiniDiagram pattern={p} sku={sku} size={68} />
                <div style={{ fontSize:9, fontWeight:700, color:isSel ? ac.primary : "#1a2340", textAlign:"center", lineHeight:1.3, maxWidth:78 }}>
                  {p.label}
                  {p.isPinwheel && <span style={{ display:"block", fontSize:8, color:isSel ? ac.primary : "#8fa0bc", fontWeight:500 }}>auto-alternates</span>}
                </div>
                <div style={{ fontSize:9, color:isSel ? ac.primary : "#5a6a88" }}>{p.cpl}/layer</div>
                {(p.ohL > 0 || p.ohW > 0) ? (
                  <span style={{ fontSize:8, color:"#d4820a", fontWeight:600, textAlign:"center" }}>
                    {p.ohL > 0 ? "+" + p.ohL + '"L ' : ""}{p.ohW > 0 ? "+" + p.ohW.toFixed(1) + '"W' : ""}
                  </span>
                ) : (
                  <span style={{ fontSize:8, color:"#1a9e6a", fontWeight:600 }}>Aligned</span>
                )}
                {isSel && <div style={{ width:5, height:5, borderRadius:3, background:ac.primary }} />}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ─── SIDE ELEVATION ──────────────────────────────────────────────────────────
  function SideElevation({ layers, activeLayer, res, palletType, onLayerClick }) {
    const W = 220, H = 110;
    const scX = (W - 44) / PL;
    const scY = (H - 10) / Math.max(res.totalH, CONSTRAINTS.MAX_HEIGHT);
    const pxW = PL * scX;
    let curY = 0;
    const items = [];

    items.push(
      <div key="cap" style={{ position:"absolute", bottom:CONSTRAINTS.MAX_HEIGHT*scY, left:0, width:pxW+50, height:0, borderTop:"1.5px dashed #ef444466" }}>
        <span style={{ position:"absolute", right:0, top:-8, fontSize:7, color:"#ef4444", fontWeight:700, whiteSpace:"nowrap" }}>{CONSTRAINTS.MAX_HEIGHT}" MAX</span>
      </div>
    );
    items.push(
      <div key="warn" style={{ position:"absolute", bottom:CONSTRAINTS.WARN_HEIGHT*scY, left:0, width:pxW+50, height:0, borderTop:"1px dashed #f5a62344" }}>
        <span style={{ position:"absolute", right:0, top:-7, fontSize:7, color:"#f5a623", whiteSpace:"nowrap" }}>{CONSTRAINTS.WARN_HEIGHT}"</span>
      </div>
    );
    items.push(
      <div key="deck" style={{ position:"absolute", bottom:0, left:0, width:pxW, height:palletType.height*scY, background:"#c9a55a", borderRadius:"0 0 2px 2px", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <span style={{ fontSize:8, color:"#fff", fontWeight:600 }}>{palletType.height}"</span>
      </div>
    );
    curY += palletType.height;

    layers.forEach((l, i) => {
      const lh = l.layerH * scY;
      const domAc = ACCENT[l.slots[0].sku.item];
      const isActive = i === Math.min(activeLayer, layers.length - 1);
      const skuLabel = l.slots.map(s => s.sku.size).join("+");
      items.push(
        <div key={i} onClick={() => onLayerClick(i)} style={{
          position:"absolute", bottom:curY*scY, left:0, width:pxW, height:lh,
          background: isActive ? domAc.light : domAc.primary + "18",
          border:"1.5px solid " + (isActive ? domAc.primary : domAc.primary + "66"),
          cursor:"pointer", borderRadius:1,
          display:"flex", alignItems:"center", justifyContent:"center", transition:"background 0.15s",
        }}>
          <span style={{ fontSize:7, color:domAc.primary, fontWeight:isActive ? 700 : 500 }}>L{i+1} {l.layerH}" {skuLabel}</span>
        </div>
      );
      items.push(
        <div key={"t"+i} style={{ position:"absolute", bottom:(curY+l.layerH)*scY-7, left:pxW+4, fontSize:8, color:isActive ? domAc.primary : "#8fa0bc" }}>
          {parseFloat((curY + l.layerH + palletType.height).toFixed(1))}"
        </div>
      );
      curY += l.layerH;
    });

    items.push(<div key="gnd" style={{ position:"absolute", bottom:0, left:0, width:pxW+36, height:2, background:"#d0d8ec" }} />);
    const hColor = res.totalH > CONSTRAINTS.MAX_HEIGHT ? "#ef4444" : res.totalH > CONSTRAINTS.WARN_HEIGHT ? "#f5a623" : "#1782f5";
    items.push(
      <div key="total" style={{ position:"absolute", bottom:curY*scY-8, left:pxW+4, fontSize:10, color:hColor, fontWeight:700 }}>{res.totalH}"</div>
    );

    return <div style={{ position:"relative", width:W, height:H }}>{items}</div>;
  }

  // ─── WARNING BANNER ──────────────────────────────────────────────────────────
  function WarningBanner({ warnings }) {
    if (!warnings.length) return null;
    const colors = {
      error:{ bg:"#fef2f2", border:"#fca5a5", text:"#dc2626", icon:"X" },
      warn: { bg:"#fffbeb", border:"#fcd49a", text:"#d97706", icon:"!" },
      info: { bg:"#eff6ff", border:"#bfdbfe", text:"#2563eb", icon:"i" },
    };
    return (
      <div style={{ display:"flex", flexDirection:"column", gap:5, padding:"8px 24px", borderBottom:"1px solid #e8edf6" }}>
        {warnings.map((w, i) => {
          const c = colors[w.level];
          return (
            <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:7, padding:"6px 10px", background:c.bg, border:"1px solid " + c.border, borderRadius:8, fontSize:11, color:c.text, fontWeight:500, lineHeight:1.4 }}>
              <span style={{ flexShrink:0, width:14, height:14, borderRadius:"50%", background:c.border, display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, fontWeight:700 }}>{c.icon}</span>
              <span>{w.msg}</span>
            </div>
          );
        })}
      </div>
    );
  }

  // ─── 2D PALLET VISUALIZER ────────────────────────────────────────────────────
  function PalletVisualizer2D({ layers, activeLayer, onLayerClick, res, palletType }) {
    if (!res || !layers.length) return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:14 }}>
        <div style={{ fontSize:60, opacity:0.1 }}>&#128666;</div>
        <div style={{ fontSize:13, color:"#8fa0bc", textAlign:"center", lineHeight:1.8 }}>Enter carton quantities<br/>to see your pallet build</div>
      </div>
    );

    const cl = Math.min(activeLayer, layers.length - 1);
    const layer = layers[cl];
    const rects = getRectsForLayer(layer);
    const sku = layer.slots[0].sku;
    const ac = ACCENT[sku.item];

    const CW = 320, CH = 250;
    const maxX = Math.max(PL, res.effectiveL);
    const maxY = Math.max(PW, res.effectiveW);
    const scale = Math.min(CW / maxX, CH / maxY) * 0.86;
    const pW = PL*scale, pH = PW*scale;
    const cW = maxX*scale, cH = maxY*scale;
    const ox = (CW - cW) / 2, oy = (CH - cH) / 2;

    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", padding:"20px 24px", gap:16, overflowY:"auto" }}>
        <div>
          <div style={{ fontSize:10, fontWeight:600, color:"#8fa0bc", letterSpacing:"0.12em", marginBottom:8 }}>LAYERS</div>
          <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
            {layers.map((l, i) => {
              const isActive = i === cl;
              const domSlot = l.slots[0];
              const lac = ACCENT[domSlot.sku.item];
              const label = l.slots.map(s => s.sku.size).join(" + ");
              return (
                <button key={i} onClick={() => onLayerClick(i)} style={{
                  padding:"4px 10px", borderRadius:20, fontSize:10, fontFamily:"inherit",
                  cursor:"pointer", fontWeight:isActive ? 600 : 400, border:"none",
                  background: isActive ? lac.primary : lac.light,
                  color: isActive ? "#fff" : lac.primary,
                  transition:"all 0.15s",
                  boxShadow: isActive ? "0 2px 8px " + lac.primary + "50" : "none",
                }}>
                  L{i+1} {label}
                </button>
              );
            })}
          </div>
        </div>

        <div>
          <div style={{ fontSize:10, fontWeight:600, color:"#8fa0bc", letterSpacing:"0.12em", marginBottom:8 }}>
            TOP-DOWN - LAYER {cl+1}
            <span style={{ fontWeight:400, color:"#a0aec0" }}> - {layer.slots.map(s => s.sku.size + " (" + s.cartonsThisSlot + " ctns)").join(" + ")}</span>
          </div>
          <div style={{ position:"relative", width:CW, height:CH }}>
            {res.hasOverhang && (
              <div style={{ position:"absolute", left:ox, top:oy, width:res.effectiveL*scale, height:res.effectiveW*scale, background:"#fff3cd18", border:"1.5px dashed #f5a623", borderRadius:3 }} />
            )}
            <div style={{ position:"absolute", left:ox, top:oy, width:pW, height:pH, background:"#f5f7fb", border:"2px solid #d0d8ec", borderRadius:3, overflow:"hidden" }}>
              {[0.33, 0.66].map(p => <div key={p} style={{ position:"absolute", left:0, right:0, top:(p*100)+"%", height:1, background:"#e4e8f4" }} />)}
              {[0.33, 0.66].map(p => <div key={p} style={{ position:"absolute", top:0, bottom:0, left:(p*100)+"%", width:1, background:"#e4e8f4" }} />)}
            </div>
            {rects.map((entry, i) => {
              const r = entry.rect, rsku = entry.sku;
              const rac = ACCENT[rsku.item];
              const px = ox + r.x*scale, py = oy + r.y*scale;
              const rw = r.w*scale, rh = r.h*scale;
              const oh = (r.x + r.w > PL) || (r.y + r.h > PW);
              return (
                <div key={i} style={{
                  position:"absolute", left:px, top:py, width:rw, height:rh,
                  background: oh ? "#fff3cd" : r.tucked ? rac.primary + "22" : rac.light,
                  border:"2px " + (r.tucked ? "dashed" : "solid") + " " + (oh ? "#f5a623" : rac.primary),
                  borderRadius:2, display:"flex", flexDirection:"column",
                  alignItems:"center", justifyContent:"center", gap:1,
                  fontSize:Math.max(7, Math.min(10, scale*1.8)),
                  color: oh ? "#d4820a" : rac.primary, fontWeight:600, overflow:"hidden",
                }}>
                  {rw > 20 && rh > 12 ? (r.w + "x" + r.h + '"') : ""}
                  {r.tucked && rw > 22 && rh > 20 ? <span style={{ fontSize:Math.max(6, scale*1.2), opacity:0.6 }}>TUCKED</span> : ""}
                </div>
              );
            })}
            <div style={{ position:"absolute", left:ox, top:oy+pH+5, width:pW, textAlign:"center", fontSize:9, color:"#8fa0bc" }}>{PL}"</div>
            <div style={{ position:"absolute", left:ox+pW+5, top:oy, height:pH, display:"flex", alignItems:"center" }}>
              <span style={{ fontSize:9, color:"#8fa0bc", writingMode:"vertical-rl" }}>{PW}"</span>
            </div>
            {res.effectiveL > PL && <div style={{ position:"absolute", left:ox+pW, top:oy+pH+5, fontSize:9, color:"#f5a623", fontWeight:600 }}>+{(res.effectiveL-PL).toFixed(1)}"</div>}
            {res.effectiveW > PW && <div style={{ position:"absolute", left:ox, top:oy+pH+16, fontSize:9, color:"#f5a623", fontWeight:600 }}>+{(res.effectiveW-PW).toFixed(1)}" W</div>}
          </div>
        </div>

        <div>
          <div style={{ fontSize:10, fontWeight:600, color:"#8fa0bc", letterSpacing:"0.12em", marginBottom:8 }}>SIDE ELEVATION</div>
          <SideElevation layers={layers} activeLayer={cl} res={res} palletType={palletType} onLayerClick={onLayerClick} />
        </div>
      </div>
    );
  }
